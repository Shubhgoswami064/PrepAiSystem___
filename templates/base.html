<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrepAI | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        
        /* Premium Background */
        .bg-mesh {
            background-color: #050505;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.2) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.2) 0, transparent 50%);
            background-attachment: fixed;
            background-size: cover;
        }

        /* Glassmorphism Classes */
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .glass-panel {
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-gradient { 
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); 
            background-size: 200% auto;
            transition: 0.5s;
        }
        .btn-gradient:hover {
            background-position: right center;
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(99, 102, 241, 0); }
            100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }
        .animate-pulse-glow {
            animation: pulse-glow 2s infinite;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="bg-mesh text-slate-200 min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="p-4 md:p-6 border-b border-white/5 bg-black/40 backdrop-blur-md sticky top-0 z-50 transition-all duration-300">
        <div class="container mx-auto flex justify-between items-center">
            <a href="{{ url_for('welcome') }}" class="text-3xl font-black tracking-tighter text-white flex items-center gap-2 group">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center group-hover:rotate-12 transition-transform">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                Prep<span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400">AI</span>
            </a>
            <div class="flex items-center space-x-4 md:space-x-8">
                {% if session.get('user') %}
                <a href="{{ url_for('dashboard') }}" class="text-sm font-bold text-slate-400 hover:text-white transition-colors">Quiz Gen</a>
                <a href="{{ url_for('chatbot_page') }}" class="text-sm font-bold text-slate-400 hover:text-white transition-colors">AI Tutor</a>
                <div class="h-6 w-px bg-white/10 hidden md:block"></div>
                <div class="flex items-center gap-4">
                    <div class="hidden md:block text-sm font-medium text-slate-300">Hello, <span class="text-indigo-400">{{ session.get('user') }}</span></div>
                    <a href="{{ url_for('logout') }}" class="text-sm font-bold bg-white/5 hover:bg-red-500/20 text-red-400 border border-white/10 hover:border-red-500/50 px-4 py-2 rounded-xl transition-all">Logout</a>
                </div>
                {% else %}
                <a href="{{ url_for('login') }}" class="text-sm font-bold text-slate-300 hover:text-white transition-colors">Log In</a>
                <a href="{{ url_for('signup') }}" class="text-sm font-bold btn-gradient px-5 py-2 rounded-xl text-white shadow-lg shadow-indigo-500/20 hover:shadow-indigo-500/40">Sign Up</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto p-4 md:p-8 flex flex-col justify-center animate-fade-in-up">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
