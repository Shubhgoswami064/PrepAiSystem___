{% extends 'base.html' %}
{% block content %}
<div class="max-w-3xl mx-auto w-full pt-4 animate-fade-in-up">
    <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
        <div id="q-count" class="font-black text-indigo-400 tracking-widest text-sm uppercase">QUESTION 1/5</div>
        <div class="h-2 w-full md:w-64 bg-white/10 rounded-full overflow-hidden shadow-inner">
            <div id="progress-bar" class="h-full bg-gradient-to-r from-indigo-500 to-purple-500 transition-all duration-700 ease-out" style="width: 20%"></div>
        </div>
    </div>

    <div id="quiz-card" class="glass p-8 md:p-12 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
        <!-- Glow -->
        <div class="absolute -top-32 -left-32 w-64 h-64 bg-indigo-500/10 rounded-full blur-[60px] pointer-events-none"></div>

        <h3 id="question-text" class="text-2xl md:text-3xl font-bold mb-10 leading-snug text-white relative z-10"></h3>
        
        <div id="options-grid" class="grid gap-4 mb-8 relative z-10"></div>

        <div id="expl-box" class="hidden p-6 bg-indigo-500/10 rounded-2xl border border-indigo-500/30 relative z-10 animate-fade-in-up">
            <h4 class="text-indigo-300 font-black mb-2 uppercase tracking-widest text-xs flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Detailed Insight
            </h4>
            <p id="expl-text" class="text-slate-300 text-base leading-relaxed mb-6"></p>
            <button onclick="nextQ()" class="w-full py-4 bg-white text-black font-black rounded-xl hover:bg-slate-200 hover:-translate-y-0.5 transition-all shadow-lg">
                Proceed to Next
            </button>
        </div>
    </div>
</div>

<script>
    let questions = JSON.parse(localStorage.getItem('currentQuiz'));
    let idx = 0;
    let score = 0;

    function render() {
        if (idx >= questions.length) {
            finish();
            return;
        }
        const q = questions[idx];
        document.getElementById('q-count').innerText = `QUESTION ${idx + 1}/${questions.length}`;
        document.getElementById('progress-bar').style.width = `${((idx+1)/questions.length)*100}%`;
        
        const qText = document.getElementById('question-text');
        qText.innerText = q.question;
        
        // Reset explanation
        const explBox = document.getElementById('expl-box');
        explBox.classList.add('hidden');
        explBox.classList.remove('animate-fade-in-up');
        
        const grid = document.getElementById('options-grid');
        grid.innerHTML = '';
        q.options.forEach((opt, index) => {
            const b = document.createElement('button');
            b.className = "text-left p-5 rounded-2xl border border-white/10 bg-black/40 hover:bg-white/10 hover:border-indigo-500/50 transition-all duration-300 transform hover:-translate-y-1";
            b.style.animationDelay = `${index * 100}ms`;
            b.classList.add('animate-fade-in-up');
            
            b.innerHTML = `<span class="text-indigo-400 font-bold mr-3">${String.fromCharCode(65 + index)}.</span> ${opt}`;
            b.onclick = () => check(opt, b);
            grid.appendChild(b);
        });
        if (window.MathJax) MathJax.typeset();
    }

    function check(choice, btn) {
        const correct = questions[idx].answer;
        document.querySelectorAll('#options-grid button').forEach(b => {
            b.disabled = true;
            b.classList.remove('hover:-translate-y-1', 'hover:bg-white/10');
            if(b.innerText.substring(3).trim() === correct.trim()) {
                b.classList.add('border-green-500/50', 'bg-green-500/20');
            } else {
                b.classList.add('opacity-50');
            }
        });
        
        if (choice === correct) {
            score++;
        } else {
            btn.classList.remove('opacity-50');
            btn.classList.add('border-red-500/50', 'bg-red-500/20');
        }
        
        document.getElementById('expl-text').innerText = questions[idx].explanation;
        const explBox = document.getElementById('expl-box');
        explBox.classList.remove('hidden');
        // trigger reflow
        void explBox.offsetWidth;
        explBox.classList.add('animate-fade-in-up');
    }

    function nextQ() { 
        document.getElementById('quiz-card').classList.remove('animate-fade-in-up');
        void document.getElementById('quiz-card').offsetWidth;
        document.getElementById('quiz-card').classList.add('animate-fade-in-up');
        idx++; 
        render(); 
    }

    async function finish() {
        const exam = localStorage.getItem('currentExam') || 'Unknown';
        const subject = localStorage.getItem('currentSubject') || 'General';
        
        try {
            await fetch('/submit-quiz', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ exam, subject, score, total: questions.length })
            });
        } catch(e) {
            console.error('Failed to save score:', e);
        }

        document.getElementById('quiz-card').innerHTML = `
            <div class="text-center space-y-8 py-10 animate-fade-in-up">
                <div class="inline-block relative">
                    <div class="absolute inset-0 bg-indigo-500 blur-3xl opacity-30 rounded-full"></div>
                    <div class="text-7xl font-black text-transparent bg-clip-text bg-gradient-to-br from-indigo-400 to-purple-400 relative z-10">${score}/${questions.length}</div>
                </div>
                <h2 class="text-4xl font-bold text-white">Session Complete</h2>
                <p class="text-slate-400">Great job! Review your mistakes or start a new topic.</p>
                <div class="pt-8 flex flex-col md:flex-row justify-center gap-4">
                    <button onclick="window.location.href='/dashboard'" class="btn-gradient px-8 py-4 rounded-2xl font-black hover:-translate-y-1 transition-transform shadow-xl shadow-indigo-500/30">Dashboard & Analytics</button>
                    <button onclick="window.location.href='/chatbot'" class="bg-white/5 border border-white/10 text-white px-8 py-4 rounded-2xl font-bold hover:bg-white/10 hover:-translate-y-1 transition-all">Talk to Tutor</button>
                </div>
            </div>`;
    }

    render();
</script>
{% endblock %}
